<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Evaluación de Asignaturas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --c1:#1D5FA6;--c2:#2478C5;--c3:#4A9DD4;--c4:#7DBFE8;
  --bg:#F4F7FA;--card:#fff;--text:#1a2535;--muted:#5a6e85;--border:#dce6ef;
  --green:#1a7a4a;--green-bg:#e8f6ee;--amber:#8a5e00;--amber-bg:#fef3d6;
  --red:#b02020;--red-bg:#fde8e8;--radius:12px;--shadow:0 2px 12px rgba(29,95,166,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#0d3d6e,#1D5FA6 60%,#2478C5);padding:26px 32px;display:flex;align-items:center;gap:20px;}
.logo-c{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;font-weight:700;border:2px solid rgba(255,255,255,0.25);flex-shrink:0;}
header h1{color:#fff;font-size:21px;font-weight:600;line-height:1.2;}
header p{color:rgba(255,255,255,0.72);font-size:13px;margin-top:3px;}
.fbar{background:var(--card);padding:14px 32px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;}
select{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);background:var(--bg);cursor:pointer;min-width:200px;outline:none;transition:border-color .2s;}
select:focus{border-color:var(--c2);}
.btn{background:var(--c1);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:7px;}
.btn:hover{background:var(--c2);}
main{padding:26px 32px;max-width:1400px;margin:0 auto;}
/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;}
.kpi-value{font-size:30px;font-weight:700;color:var(--c1);line-height:1.1;margin:6px 0 2px;}
.kpi-sub{font-size:12px;color:var(--muted);}
/* Chart cards */
.sec-title{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:14px;border-left:3px solid var(--c1);padding-left:10px;}
.charts-top{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.chart-card h3{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em;}
.chart-wrap{position:relative;width:100%;}
/* Stacked section */
.stacked-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;}
.stacked-card h3{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.sub-note{font-size:11px;color:var(--muted);margin-bottom:16px;}
.legend-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;font-size:11px;color:var(--text);}
.ld{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
/* Matrix per-question blocks */
.matrix-section{margin-bottom:26px;}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.mblock{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.mblock-hdr{background:linear-gradient(90deg,var(--c1),var(--c3));padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mblock-hdr span{color:#fff;font-size:12px;font-weight:600;line-height:1.25;}
.mblock-avg{font-size:10px;background:rgba(0,0,0,0.2);color:#fff;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.mblock-body{padding:12px 16px;display:flex;flex-direction:column;gap:9px;}
.mq{display:flex;align-items:center;gap:8px;}
.mq-lbl{font-size:10.5px;color:var(--text);width:185px;min-width:185px;flex-shrink:0;line-height:1.3;}
.mq-track{flex:1;display:flex;height:15px;border-radius:3px;overflow:hidden;gap:1px;min-width:0;}
.mq-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:rgba(255,255,255,.9);overflow:hidden;white-space:nowrap;}
.mq-num{font-size:10px;font-weight:700;min-width:26px;text-align:right;flex-shrink:0;}
.mq-na{font-size:10px;color:var(--muted);font-style:italic;}
/* Detail tables */
.section-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
.section-hdr{background:linear-gradient(90deg,var(--c1),var(--c3));padding:11px 18px;display:flex;align-items:center;gap:10px;}
.section-hdr h2{color:#fff;font-size:13px;font-weight:600;}
.sbadge{background:rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;}
.items-grid{display:grid;grid-template-columns:1fr 1fr;}
.item-row{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.item-row:nth-child(odd){background:#f8fafc;}
.iq{font-size:12px;color:var(--text);flex:1;line-height:1.4;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.b-exc{background:#d1fae5;color:#065f46;}
.b-bue{background:var(--green-bg);color:var(--green);}
.b-ace{background:var(--amber-bg);color:var(--amber);}
.b-def{background:var(--red-bg);color:var(--red);}
.b-na{background:#f1f5f9;color:#64748b;}
/* Satisfaccion */
.sat-dist{display:flex;flex-direction:column;gap:8px;padding:4px 0;}
.sat-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.sat-lbl{width:68px;color:var(--muted);flex-shrink:0;}
.sat-track{flex:1;background:#eef2f7;border-radius:6px;height:13px;overflow:hidden;}
.sat-fill{height:100%;border-radius:6px;}
.sat-n{width:22px;text-align:right;font-weight:600;color:var(--text);flex-shrink:0;}
/* Comments */
.text-analysis{margin-bottom:26px;}
.comm-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.comm-hdr{background:linear-gradient(90deg,#0d3d6e,#1D5FA6);padding:13px 18px;}
.comm-hdr h2{color:#fff;font-size:13px;font-weight:600;}
.comm-body{padding:18px;}
.top5-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px;}
.t5{border:1px solid var(--border);border-radius:10px;padding:13px 13px 10px;background:var(--bg);position:relative;}
.t5-num{position:absolute;top:-9px;left:13px;background:var(--c1);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.t5-txt{font-size:12.5px;color:var(--text);line-height:1.5;margin-top:6px;}
.t5-bar{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:4px;}
.fbar-seg{display:inline-block;height:5px;border-radius:3px;background:var(--c3);}
.raw-section{margin-top:4px;border-top:1px solid var(--border);padding-top:14px;}
.raw-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:10px;}
.raw-item{padding:9px 13px;border-left:3px solid var(--c4);background:var(--bg);border-radius:0 8px 8px 0;margin-bottom:7px;font-size:12px;color:var(--muted);line-height:1.5;}
/* Misc */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}
.empty-ico{font-size:38px;margin-bottom:12px;}
footer{border-top:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:10px;}
.csv-z{display:flex;align-items:center;gap:8px;opacity:0.35;transition:opacity .2s;cursor:pointer;}
.csv-z:hover{opacity:1;}
.csv-z label{cursor:pointer;font-size:10px;color:var(--muted);text-decoration:underline;text-underline-offset:2px;}
#csv-input{display:none;}
.sync-bar{background:#e8f1fb;border-bottom:1px solid #bcd6f0;padding:7px 32px;display:flex;align-items:center;gap:10px;font-size:12px;color:#1a4f80;flex-wrap:wrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#37a6dd;flex-shrink:0;}
.sync-dot.ok{background:#1a7a4a;}
.sync-dot.err{background:#b02020;}
.sync-dot.spin{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-btn{background:#1D5FA6;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;}
.sync-btn:hover{background:#2478C5;}
@media(max-width:768px){
  main,.fbar,header,footer,.sync-bar{padding-left:16px;padding-right:16px;}
  .charts-top,.matrix-grid,.items-grid,.top5-grid{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header>
  <div class="logo-c">UM</div>
  <div>
    <h1>Dashboard de Evaluación de Asignaturas</h1>
    <p>Programa de Medicina — Universidad del Cauca</p>
  </div>
</header>

<div class="sync-bar" id="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>

<div class="fbar">

    <label for="csv-input">Cargar CSV</label>

</footer>

let charts = {};

/* ── Helpers ── */
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }
function avgField(recs,f){ const v=recs.map(r=>LK[r[f]]).filter(x=>x>0); return avg(v); }
function scoreLabel(s){ if(s===null)return 'N/A'; if(s>=3.5)return 'Excelente'; if(s>=2.5)return 'Bueno'; if(s>=1.5)return 'Aceptable'; return 'Deficiente'; }
function semColor(v){ return v>=3?'#1a7a4a':v>=2?'#e8a020':'#b02020'; }
function shortQ(q){ return q.replace(/^La |^El |^Si aplica, /,'').replace(/ fue:$/,'').replace(/ fueron:$/,'').trim().split(' ').slice(0,8).join(' ')+'…'; }
function badgeClass(v){ const m={'Excelente':'b-exc','Bueno':'b-bue','Aceptable':'b-ace','Deficiente':'b-def'}; return m[v]||'b-na'; }
function destroyCharts(){ Object.values(charts).forEach(c=>c.destroy()); charts={}; }

/* ── Selectors ── */
function initSelectors(){
  const as=document.getElementById('sel-asig');
  as.innerHTML='<option value="">— Todas las asignaturas —</option>';
  const present=[...new Set(DATA.map(r=>r['Asignatura a evaluar']).filter(Boolean))];
  const ordered=ASIG_LIST.filter(a=>present.includes(a));
  const rest=present.filter(a=>!ASIG_LIST.includes(a));
  [...ordered,...rest].forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;as.appendChild(o);});
  const ps=document.getElementById('sel-per');
  ps.innerHTML='<option value="">— Todos los periodos —</option>';
  [...new Set(DATA.map(r=>r['Periodo en evaluación']).filter(Boolean))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;ps.appendChild(o);});
}

function getFiltered(){
  const a=document.getElementById('sel-asig').value;
  const p=document.getElementById('sel-per').value;
  return DATA.filter(r=>(!a||r['Asignatura a evaluar']===a)&&(!p||r['Periodo en evaluación']===p));
}

/* ── Main render ── */
function renderDashboard(){
  const recs=getFiltered();
  destroyCharts();
  if(!recs.length){ document.getElementById('main').innerHTML=`<div class="empty"><div class="empty-ico">🔍</div><p>No hay datos para la selección actual.</p></div>`; return; }

  const asig=document.getElementById('sel-asig').value||'Todas las asignaturas';
  const per=document.getElementById('sel-per').value||'Todos los periodos';

  const allF=SECS.flatMap(s=>s.fields);
  const gScores=allF.map(f=>avgField(recs,f)).filter(v=>v!==null);
  const gAvg=avg(gScores)||0;

  const satCnt=Object.fromEntries(SAT_ORD.map(k=>[k,0]));
  recs.forEach(r=>{const s=r['¿Cuál es su nivel de satisfacción general con esta asignatura?'];if(s&&satCnt[s]!==undefined)satCnt[s]++;});
  const totSat=Object.values(satCnt).reduce((a,b)=>a+b,0);
  const satAvg=totSat?Object.entries(satCnt).map(([k,v])=>(SAT_ORD.indexOf(k)+1)*v).reduce((a,b)=>a+b,0)/totSat:0;
  const satPct=Math.round(satAvg/5*100);

  const legend=`<div class="legend-row">${LK_CATS.map(c=>`<span><span class="ld" style="background:${LK_COL[c]}"></span>${c}</span>`).join('')}<span style="color:var(--muted);margin-left:6px">· número = promedio</span></div>`;

  document.getElementById('main').innerHTML=`
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Respuestas</div><div class="kpi-value">${recs.length}</div><div class="kpi-sub">${asig.length>32?asig.slice(0,32)+'…':asig}</div></div>
    <div class="kpi-card"><div class="kpi-label">Puntaje global</div><div class="kpi-value" style="color:${semColor(gAvg)}">${gAvg.toFixed(2)}</div><div class="kpi-sub">${scoreLabel(gAvg)} / 4.0</div></div>
    <div class="kpi-card"><div class="kpi-label">Satisfacción</div><div class="kpi-value" style="color:${semColor(satAvg/5*4)}">${satPct}%</div><div class="kpi-sub">${satAvg.toFixed(1)} / 5.0</div></div>
    <div class="kpi-card"><div class="kpi-label">Periodo</div><div class="kpi-value" style="font-size:20px">${per}</div><div class="kpi-sub">Evaluado</div></div>
  </div>

  <div class="charts-top">
    <div class="chart-card">
      <h3>Puntaje promedio por sección</h3>
      <div class="chart-wrap" style="height:250px"><canvas id="c-sec" role="img" aria-label="Promedio por sección"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Satisfacción general</h3>
      <div class="sat-dist">${SAT_ORD.map(k=>`<div class="sat-row"><span class="sat-lbl">${k}</span><div class="sat-track"><div class="sat-fill" style="width:${totSat?Math.round(satCnt[k]/totSat*100):0}%;background:${SAT_COL[k]}"></div></div><span class="sat-n">${satCnt[k]}</span></div>`).join('')}</div>
    </div>
  </div>

  <div class="stacked-card">
    <h3>Distribución de respuestas por sección (Likert)</h3>
    <p class="sub-note">Porcentaje de respuestas en cada categoría, excluyendo "No aplica".</p>
    <div class="legend-row">${LK_CATS.map(c=>`<span><span class="ld" style="background:${LK_COL[c]}"></span>${c}</span>`).join('')}</div>
    <div class="chart-wrap" style="height:${SECS.length*58+50}px"><canvas id="c-stk" role="img" aria-label="Distribución Likert por sección"></canvas></div>
  </div>

  <div class="matrix-section">
    <p class="sec-title">Distribución por pregunta y matriz</p>
    ${legend}
    <div class="matrix-grid">${SECS.map(s=>matrixBlock(s,recs)).join('')}</div>
  </div>

  ${SECS.map(s=>detailCard(s,recs)).join('')}

  <div class="text-analysis">
    <p class="sec-title">Comentarios y sugerencias</p>

  setTimeout(()=>{drawSecChart(recs);drawStkChart(recs);},80);

/* ── Matrix block (per-question stacked bars, HTML) ── */
function matrixBlock(sec, recs){
  const items=sec.fields.map(f=>{
    const vals=recs.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LK[v]!==undefined);
    if(!vals.length) return {f,pcts:null,av:null};
    const tot=vals.length;
    const pcts={};
    LK_CATS.forEach(c=>{pcts[c]=parseFloat((vals.filter(v=>v===c).length/tot*100).toFixed(1));});
    const av=vals.map(v=>LK[v]).reduce((a,b)=>a+b,0)/tot;
    return {f,pcts,av,tot};
  });
  const valid=items.filter(i=>i.av!==null);
  const sAvg=valid.length?avg(valid.map(i=>i.av)):null;

  const rows=items.map(item=>{
    const lbl=shortQ(item.f);
    if(!item.pcts) return `<div class="mq"><span class="mq-lbl">${lbl}</span><span class="mq-na">No aplica</span></div>`;
    const segs=LK_CATS.map(c=>{
      const p=item.pcts[c];
      if(p<0.5) return '';
      return `<div class="mq-seg" style="width:${p}%;background:${LK_COL[c]}" title="${c}: ${p}%">${p>=14?Math.round(p)+'%':''}</div>`;
    }).join('');
    return `<div class="mq">
      <span class="mq-lbl">${lbl}</span>
      <div class="mq-track">${segs}</div>
      <span class="mq-num" style="color:${semColor(item.av)}">${item.av.toFixed(1)}</span>
    </div>`;
  }).join('');

  return `<div class="mblock">
    <div class="mblock-hdr">
      <span>${sec.title}</span>
      ${sAvg!==null?`<span class="mblock-avg">prom. ${sAvg.toFixed(2)}</span>`:''}
    </div>
    <div class="mblock-body">${rows}</div>
  </div>`;
}

/* ── Detail table card ── */
function detailCard(sec,recs){
  const applicable=recs.filter(r=>sec.fields.some(f=>{const v=r[f];return v&&v!=='No aplica'&&LK[v]!==undefined;}));
  const items=sec.fields.map(f=>{
    const vals=recs.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LK[v]!==undefined);
    const modal=vals.reduce((acc,v)=>{acc[v]=(acc[v]||0)+1;return acc;},{});
    const mv=Object.keys(modal).sort((a,b)=>modal[b]-modal[a])[0]||null;
    return {f,mv};
  });
  const sScores=sec.fields.map(f=>avgField(recs,f)).filter(v=>v!==null);
  const sAvg=avg(sScores);
  return `<div class="section-card">
    <div class="section-hdr">
      <h2>${sec.title}</h2>
      <span class="sbadge">${applicable.length} resp. aplicables</span>
      ${sAvg!==null?`<span class="sbadge" style="margin-left:auto">${sAvg.toFixed(2)} / 4.0</span>`:''}
    </div>
    <div class="items-grid">${items.map(it=>`
      <div class="item-row">
        <span class="iq">${shortQ(it.f)}</span>
        ${it.mv?`<span class="badge ${badgeClass(it.mv)}">${it.mv}</span>`:'<span class="badge b-na">N/A</span>'}
      </div>`).join('')}
    </div>
  </div>`;
}

/* ── Comments card ── */
function commentsCard(recs){
  const SKIP=['No aplica.','No aplica','Ninguno','ninguno','N/A','ninguna','no aplica'];
  const texts=[];
  SECS.forEach(s=>recs.forEach(r=>{
    const v=r[s.txt];
    if(v&&typeof v==='string'&&v.trim()&&!SKIP.some(x=>norm(v.trim())===norm(x))) texts.push(v.trim());
  }));
  if(!texts.length) return `<div class="comm-card"><div class="comm-hdr"><h2>Sin comentarios disponibles</h2></div></div>`;

  const top5=top5Topics(texts);
  const maxF=top5[0]?.count||1;

  return `<div class="comm-card">
    <div class="comm-hdr"><h2>Top 5 temas más frecuentes · ${texts.length} comentarios recibidos</h2></div>
    <div class="comm-body">
      <div class="top5-grid">
        ${top5.map((t,i)=>`
          <div class="t5">
            <div class="t5-num">#${i+1}</div>
            <div class="t5-txt">${t.summary}</div>
            <div class="t5-bar">
              <span class="fbar-seg" style="width:${Math.round(t.count/maxF*60)+8}px"></span>
              Presente en ${t.count} de ${texts.length} comentarios
            </div>
          </div>`).join('')}
      </div>
      <div class="raw-section">
        <p class="raw-title">Todos los comentarios (${texts.length})</p>
        ${texts.map(t=>`<div class="raw-item">${t}</div>`).join('')}
      </div>
    </div>
  </div>`;
}

function top5Topics(texts){
  const TOPICS=[
    {keys:['bibliograf','referencia','actualiz','recurso','document','digital','acceso','fuente','libro']},
    {keys:['didáctic','metodolog','estrategia','tic','tecnolog','herramienta','clase','enseñanza','dinámic']},
    {keys:['retroaliment','evaluacion','evaluación','examen','calificac','nota','coherencia','criterio','parcial']},
    {keys:['clínic','práctic','hospital','escenario','rotación','paciente','infraestructura','equipo']},
    {keys:['investigac','científic','artículo','caso','crítico','análisis','formativ']},
    {keys:['docente','profesor','disponib','atención','horario','acompañ','seguimiento','trato','diálogo']},
    {keys:['contenido','programa','cronograma','tema','teóric','temátic','plan']},
    {keys:['laboratori','insumo','mater','instalac','guía','equipo']},
    {keys:['independiente','carga','autónomo','autoestudio','intensidad','tiempo']},
    {keys:['profesional','perfil','proyección','integrac','social','aplicabilidad']},
  ];
  const lowers=texts.map(t=>norm(t));
  return TOPICS.map(tp=>{
    const nkeys=tp.keys.map(k=>norm(k));
    const matching=lowers.filter(t=>nkeys.some(k=>t.includes(k)));
    let best='',bestLen=0;
    texts.forEach((t,i)=>{if(nkeys.some(k=>lowers[i].includes(k))&&t.length>bestLen){best=t;bestLen=t.length;}});
    const summary=best.length>130?best.slice(0,127).replace(/\s\S*$/,'')+'…':(best||tp.keys[0]);
    return {count:matching.length,summary};
  }).filter(t=>t.count>0).sort((a,b)=>b.count-a.count).slice(0,5);
}

/* ── Charts ── */
function drawSecChart(recs){
  const ctx=document.getElementById('c-sec'); if(!ctx)return;
  const labels=SECS.map(s=>s.title);
  const data=SECS.map(s=>{
    const vals=s.fields.flatMap(f=>recs.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LK[v]!==undefined).map(v=>LK[v]));
    return vals.length?parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)):0;
  });
  const cols=data.map(v=>semColor(v));
  charts['sec']=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:cols.map(c=>c+'33'),borderColor:cols,borderWidth:2,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`Promedio: ${c.parsed.y.toFixed(2)}`}}},scales:{y:{min:0,max:4,ticks:{stepSize:1,callback:v=>['','Deficiente','Aceptable','Bueno','Excelente'][v]||v,font:{size:10}},grid:{color:'#eef2f7'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
}

function drawStkChart(recs){
  const ctx=document.getElementById('c-stk'); if(!ctx)return;
  const labels=SECS.map(s=>s.title);
  const datasets=LK_CATS.map(cat=>({
    label:cat,
    backgroundColor:LK_COL[cat]+'cc',
    borderColor:LK_COL[cat],
    borderWidth:1,
    data:SECS.map(s=>{
      const vals=s.fields.flatMap(f=>recs.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LK[v]!==undefined));
      return vals.length?parseFloat((vals.filter(v=>v===cat).length/vals.length*100).toFixed(1)):0;
    })
  }));
  charts['stk']=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x.toFixed(1)}%`}}},scales:{x:{stacked:true,min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'#eef2f7'}},y:{stacked:true,ticks:{font:{size:11}}}}}});
}

/* ── CSV loader ── */
function loadCSV(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('CSV vacío o sin datos.');return;}
      const headers=parseCSV(lines[0]);
      const recs=[];
      for(let i=1;i<lines.length;i++){
        const vals=parseCSV(lines[i]);
        if(vals.length<2)continue;
        const obj={};
        headers.forEach((h,idx)=>{obj[h.trim()]=(vals[idx]||'').trim();});
        recs.push(obj);
      }
      if(!recs.length){alert('No se encontraron registros.');return;}
      DATA=recs;
      initSelectors();
      renderDashboard();
      e.target.value='';
      alert(`✅ ${recs.length} registros cargados correctamente.`);
    }catch(err){alert('Error leyendo CSV: '+err.message);}
  };
  reader.readAsText(file,'UTF-8');
}

function parseCSV(line){
  const out=[]; let cur=''; let q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===','&&!q){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur);
  return out;
}

/* ── REDCap Sync ── */
// ⚠️  Cambia esta URL por la de tu proxy Vercel después del deploy
const PROXY_URL = 'https://redcap-proxy-med.vercel.app';
const AUTO_REFRESH_MIN = 30; // refresca cada N minutos automáticamente

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-msg');
  dot.className = 'sync-dot ' + (state === 'ok' ? 'ok' : state === 'err' ? 'err' : 'spin');
  txt.textContent = msg;
}

async function syncREDCap() {
  setSyncStatus('spin', 'Descargando datos desde REDCap…');
  try {
    const res = await fetch(PROXY_URL, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!Array.isArray(json) || json.length === 0) throw new Error('Sin registros en la respuesta');
    DATA = json;
    const now = new Date().toLocaleString('es-CO', {dateStyle:'short', timeStyle:'short'});
    setSyncStatus('ok', `${json.length} registros · última actualización: ${now}`);
    document.getElementById('footer-ts').textContent = now;
    initSelectors();
    renderDashboard();
  } catch(e) {
    setSyncStatus('err', `Error REDCap: ${e.message} — usando datos locales`);
    document.getElementById('footer-src').textContent = 'Fuente: datos locales (sin conexión REDCap)';
    initSelectors();
    renderDashboard();
  }
}

/* ── Boot ── */
syncREDCap();
setInterval(syncREDCap, AUTO_REFRESH_MIN * 60 * 1000);
