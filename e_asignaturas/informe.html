<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Evaluación de Asignaturas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --c1:#1D5FA6;--c2:#2478C5;--c3:#4A9DD4;--c4:#7DBFE8;
  --bg:#F4F7FA;--card:#fff;--text:#1a2535;--muted:#5a6e85;--border:#dce6ef;
  --green:#1a7a4a;--green-bg:#e8f6ee;--amber:#8a5e00;--amber-bg:#fef3d6;
  --red:#b02020;--red-bg:#fde8e8;--radius:12px;--shadow:0 2px 12px rgba(29,95,166,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#0d3d6e,#1D5FA6 60%,#2478C5);padding:26px 32px;display:flex;align-items:center;gap:20px;}
.logo-c{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;font-weight:700;border:2px solid rgba(255,255,255,0.25);flex-shrink:0;}
header h1{color:#fff;font-size:21px;font-weight:600;line-height:1.2;}
header p{color:rgba(255,255,255,0.72);font-size:13px;margin-top:3px;}
.fbar{background:var(--card);padding:14px 32px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;}
select{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);background:var(--bg);cursor:pointer;min-width:200px;outline:none;transition:border-color .2s;}
select:focus{border-color:var(--c2);}
.btn{background:var(--c1);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:7px;}
.btn:hover{background:var(--c2);}
main{padding:26px 32px;max-width:1400px;margin:0 auto;}
/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;}
.kpi-value{font-size:30px;font-weight:700;color:var(--c1);line-height:1.1;margin:6px 0 2px;}
.kpi-sub{font-size:12px;color:var(--muted);}
/* Chart cards */
.sec-title{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:14px;border-left:3px solid var(--c1);padding-left:10px;}
.charts-top{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.chart-card h3{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em;}
.chart-wrap{position:relative;width:100%;}
/* Stacked section */
.stacked-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;}
.stacked-card h3{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.sub-note{font-size:11px;color:var(--muted);margin-bottom:16px;}
.legend-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;font-size:11px;color:var(--text);}
.ld{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
/* Matrix per-question blocks */
.matrix-section{margin-bottom:26px;}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.mblock{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.mblock-hdr{background:linear-gradient(90deg,var(--c1),var(--c3));padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mblock-hdr span{color:#fff;font-size:12px;font-weight:600;line-height:1.25;}
.mblock-avg{font-size:10px;background:rgba(0,0,0,0.2);color:#fff;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.mblock-body{padding:12px 16px;display:flex;flex-direction:column;gap:9px;}
.mq{display:flex;align-items:center;gap:8px;}
.mq-lbl{font-size:10.5px;color:var(--text);width:185px;min-width:185px;flex-shrink:0;line-height:1.3;}
.mq-track{flex:1;display:flex;height:15px;border-radius:3px;overflow:hidden;gap:1px;min-width:0;}
.mq-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:rgba(255,255,255,.9);overflow:hidden;white-space:nowrap;}
.mq-num{font-size:10px;font-weight:700;min-width:26px;text-align:right;flex-shrink:0;}
.mq-na{font-size:10px;color:var(--muted);font-style:italic;}
/* Satisfaccion */
.sat-dist{display:flex;flex-direction:column;gap:8px;padding:4px 0;}
.sat-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.sat-lbl{width:68px;color:var(--muted);flex-shrink:0;}
.sat-track{flex:1;background:#eef2f7;border-radius:6px;height:13px;overflow:hidden;}
.sat-fill{height:100%;border-radius:6px;}
.sat-n{width:22px;text-align:right;font-weight:600;color:var(--text);flex-shrink:0;}
/* Comments / AI Top 10 */
.text-analysis{margin-bottom:26px;}
.comm-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.comm-hdr{background:linear-gradient(90deg,#0d3d6e,#1D5FA6);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.comm-hdr h2{color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.comm-body{padding:18px;}
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px;color:var(--muted);font-size:13px;}
.ai-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--c1);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.top10-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:20px;}
.t10{border:1px solid var(--border);border-radius:10px;padding:14px 13px 11px;background:var(--bg);position:relative;}
.t10-num{position:absolute;top:-10px;left:13px;background:var(--c1);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.t10-title{font-size:13px;font-weight:600;color:var(--text);margin-top:6px;line-height:1.3;}
.t10-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;}
.t10-freq{font-size:11px;color:var(--c2);margin-top:7px;font-weight:600;}
.raw-section{margin-top:4px;border-top:1px solid var(--border);padding-top:14px;}
.raw-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:10px;}
.raw-item{padding:9px 13px;border-left:3px solid var(--c4);background:var(--bg);border-radius:0 8px 8px 0;margin-bottom:7px;font-size:12px;color:var(--muted);line-height:1.5;}
.raw-toggle{margin-top:8px;}
.btn-show-all{background:#fff;border:1.5px solid var(--c1);color:var(--c1);border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;width:100%;text-align:center;transition:background .2s;}
.btn-show-all:hover{background:#e8f1fb;}
/* Alerts section */
.alerts-section{margin-bottom:26px;}
.alerts-card{background:var(--card);border-radius:var(--radius);border:1px solid #f5c6c6;box-shadow:var(--shadow);overflow:hidden;}
.alerts-hdr{background:linear-gradient(90deg,#7f1d1d,#b02020);padding:13px 18px;display:flex;align-items:center;gap:10px;}
.alerts-hdr h2{color:#fff;font-size:13px;font-weight:600;}
.alerts-body{padding:18px;}
.alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.alert-item{border-radius:10px;padding:14px 14px 11px;position:relative;border:1px solid;}
.alert-item.alta{background:#fef2f2;border-color:#fca5a5;}
.alert-item.media{background:#fff7ed;border-color:#fdba74;}
.alert-rank{position:absolute;top:-10px;left:13px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff;}
.alert-rank.alta{background:#b02020;}
.alert-rank.media{background:#c2570a;}
.alert-cat{font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-top:6px;}
.alert-cat.alta{color:#b02020;}
.alert-cat.media{color:#c2570a;}
.alert-prob{font-size:12.5px;color:var(--text);line-height:1.5;margin-top:4px;font-weight:500;}
.alert-quote{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:7px;padding:7px 10px;background:rgba(0,0,0,0.04);border-radius:6px;font-style:italic;}
.urgencia-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:7px;}
.urgencia-alta{background:#fee2e2;color:#b02020;}
.urgencia-media{background:#ffedd5;color:#c2570a;}
/* Misc */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}
.empty-ico{font-size:38px;margin-bottom:12px;}
footer{border-top:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:10px;}
.csv-z{display:flex;align-items:center;gap:8px;opacity:0.35;transition:opacity .2s;cursor:pointer;}
.csv-z:hover{opacity:1;}
.csv-z label{cursor:pointer;font-size:10px;color:var(--muted);text-decoration:underline;text-underline-offset:2px;}
#csv-input{display:none;}
.sync-bar{background:#e8f1fb;border-bottom:1px solid #bcd6f0;padding:7px 32px;display:flex;align-items:center;gap:10px;font-size:12px;color:#1a4f80;flex-wrap:wrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#37a6dd;flex-shrink:0;}
.sync-dot.ok{background:#1a7a4a;}
.sync-dot.err{background:#b02020;}
.sync-dot.spin{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-btn{background:#1D5FA6;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;}
.sync-btn:hover{background:#2478C5;}
@media(max-width:768px){
  main,.fbar,header,footer,.sync-bar{padding-left:16px;padding-right:16px;}
  .charts-top,.matrix-grid,.items-grid,.top5-grid{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}
/* ── Auth overlay ── */
#auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0d3d6e 0%,#1D5FA6 60%,#2478C5 100%);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:#fff;border-radius:16px;padding:36px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo-circle{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#1D5FA6,#2478C5);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700;margin:0 auto 10px;}
.auth-logo h2{font-size:17px;font-weight:700;color:var(--text);}
.auth-logo p{font-size:12px;color:var(--muted);margin-top:2px;}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:#f8fafc;color:var(--muted);border:none;transition:all .2s;}
.auth-tab.active{background:var(--c1);color:#fff;}
.auth-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.auth-field label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;}
.auth-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;width:100%;}
.auth-input:focus{border-color:var(--c2);}
.auth-btn{width:100%;background:var(--c1);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;}
.auth-btn:hover{background:var(--c2);}
.auth-msg{font-size:12px;padding:10px 13px;border-radius:7px;margin-top:10px;text-align:center;}
.auth-msg.ok{background:var(--green-bg);color:var(--green);}
.auth-msg.err{background:var(--red-bg);color:var(--red);}
.auth-msg.info{background:#e8f1fb;color:#1a4f80;}
.auth-select{border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text);outline:none;width:100%;background:#fff;cursor:pointer;}
/* User info in header */
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border-radius:20px;padding:5px 14px 5px 10px;cursor:pointer;border:1px solid rgba(255,255,255,0.25);margin-left:auto;}
.user-pill span{color:#fff;font-size:12px;font-weight:600;}
.user-pill svg{flex-shrink:0;}
/* Director panel */
.dir-panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
.dir-panel-hdr{background:linear-gradient(90deg,#0d3d6e,#1D5FA6);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;}
.dir-panel-hdr h3{color:#fff;font-size:13px;font-weight:600;}
.pending-row{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border);gap:12px;font-size:13px;}
.pending-row:last-child{border-bottom:none;}
.pending-info{flex:1;}
.pending-name{font-weight:600;color:var(--text);}
.pending-sub{font-size:11px;color:var(--muted);}
.btn-activate{background:var(--green-bg);color:var(--green);border:1px solid var(--green);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-activate:hover{background:var(--green);color:#fff;}
.btn-manage{background:#e8f1fb;color:var(--c1);border:1px solid var(--c1);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;margin-left:6px;}
.btn-manage:hover{background:var(--c1);color:#fff;}
.asig-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.asig-chip{background:#e8f1fb;color:var(--c1);border-radius:20px;padding:2px 10px;font-size:11px;display:flex;align-items:center;gap:4px;}
.asig-chip-del{cursor:pointer;font-weight:700;color:#b02020;margin-left:2px;}
.asig-add-row{display:flex;gap:6px;margin-top:8px;align-items:center;}
.asig-add-sel{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;}
.dir-tabs{display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);}
.dir-tab{font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);background:#f8fafc;color:var(--muted);}
.dir-tab.active{background:var(--c1);color:#fff;border-color:var(--c1);}
.all-users-list{padding:4px 0;}
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-circle">UM</div>
      <h2>Dashboard de Evaluación</h2>
      <p>Programa de Medicina — Universidad del Cauca</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="showTab('register')">Registrarme</button>
    </div>

    <!-- Login -->
    <div id="tab-login">
      <div class="auth-field"><label>Correo institucional</label><input class="auth-input" id="l-correo" type="email" placeholder="usuario@unicauca.edu.co"></div>
      <div class="auth-field"><label>Contraseña</label><input class="auth-input" id="l-pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="auth-btn" onclick="doLogin()">Ingresar</button>
      <div id="login-msg"></div>
    </div>

    <!-- Register -->
    <div id="tab-register" style="display:none">
      <div class="auth-field"><label>Correo institucional</label><input class="auth-input" id="r-correo" type="email" placeholder="usuario@unicauca.edu.co"></div>
      <div class="auth-field"><label>Nombre completo</label><input class="auth-input" id="r-nombre" type="text" placeholder="Nombre Apellido"></div>
      <div class="auth-field">
        <label>Asignatura que coordina</label>
        <select class="auth-select" id="r-asig">
          <option value="">— Seleccione —</option>
          <option>Biología celular, molecular y bioquímica (L)</option>
          <option>Fundamentos de investigación I</option>
          <option>Ética Médica I</option>
          <option>Introducción a la Medicina</option>
          <option>Morfología (L)</option>
          <option>Fundamentos de investigación II</option>
          <option>Psicobiología</option>
          <option>Fisiología general y de sistemas (L)</option>
          <option>Fundamentos de investigación III</option>
          <option>Genética básica</option>
          <option>Microbiología y parasitología básico-clínica (L)</option>
          <option>Patología General</option>
          <option>Fundamentos de investigación IV</option>
          <option>Farmacología</option>
          <option>Semiología</option>
          <option>Psicología</option>
          <option>Salud Familiar</option>
          <option>Cirugía General</option>
          <option>Seminario de Historia de la Medicina</option>
          <option>Medicina Interna I</option>
          <option>Patología Especial (L)</option>
          <option>Psicopatología</option>
          <option>Seminario de Gerontología y Geriatría</option>
          <option>Medicina Interna II</option>
          <option>Psiquiatría</option>
          <option>Ética Médica II</option>
          <option>Seminario de tanatología y cuidado paliativo</option>
          <option>Cirugía especialidades</option>
          <option>Seminario taller de desastres</option>
          <option>Pediatría</option>
          <option>Administración en salud</option>
          <option>Ginecología y Obstetricia</option>
          <option>Medicina preventiva</option>
          <option>Medicina legal</option>
        </select>
      </div>
      <div class="auth-field"><label>Contraseña</label><input class="auth-input" id="r-pwd" type="password" placeholder="Mínimo 6 caracteres"></div>
      <div class="auth-field"><label>Confirmar contraseña</label><input class="auth-input" id="r-pwd2" type="password" placeholder="Repite la contraseña"></div>
      <button class="auth-btn" onclick="doRegister()">Crear cuenta</button>
      <div id="register-msg"></div>
    </div>
  </div>
</div>

<header>
  <div class="logo-c">UM</div>
  <div>
    <h1>Dashboard de Evaluación de Asignaturas</h1>
    <p>Programa de Medicina — Universidad del Cauca</p>
  </div>
  <div class="user-pill" id="user-pill" onclick="doLogout()" title="Cerrar sesión" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span id="user-name">—</span>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </div>
</header>

<div class="sync-bar" id="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-msg">Conectando con REDCap…</span>
  <button class="sync-btn" onclick="syncREDCap()">↻ Sincronizar ahora</button>
</div>

<div class="fbar">
  <div class="fg">
    <label>Asignatura</label>
    <select id="sel-asig"><option value="">— Todas las asignaturas —</option></select>
  </div>
  <div class="fg">
    <label>Periodo</label>
    <select id="sel-per"><option value="">— Todos los periodos —</option></select>
  </div>
  <button class="btn" onclick="renderDashboard()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    Actualizar
  </button>
</div>

<main id="main">
  <div class="empty"><div class="empty-ico">📊</div><p>Selecciona una asignatura y periodo para ver los resultados</p></div>

function initSelectors(){

  as.innerHTML='<option value="">— Todas las asignaturas —</option>';

  if(window.SESSION?.user?.rol==='coordinador'){
    // Coordinador: only show their own asignaturas
    const extras=(window.SESSION.user.asignaturas_extra||'').split('|').filter(Boolean);
    const allA=[window.SESSION.user.asignatura,...extras].filter(Boolean);
    allA.forEach(a=>{
      const o=document.createElement('option');o.value=a;o.textContent=a;as.appendChild(o);
    });
    if(allA.length===1){
      as.value=allA[0]; as.disabled=true;
    } else {
      as.disabled=false;
      as.value=prevAsig&&allA.includes(prevAsig)?prevAsig:'';
    }
  } else {
    // Director: show all asignaturas present in data
    const present=[...new Set(window.DATA.map(r=>r['Asignatura a evaluar']).filter(v=>v&&v.trim()))];
    const ordered=ASIG_LIST.filter(a=>present.includes(a));
    const rest=present.filter(a=>!ASIG_LIST.includes(a));
    [...ordered,...rest].forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;as.appendChild(o);});
    as.value=prevAsig||'';
    as.disabled=false;
  }

  const ps=document.getElementById('sel-per');
  ps.innerHTML='<option value="">— Todos los periodos —</option>';
  [...new Set(window.DATA.map(r=>r['Periodo en evaluación']).filter(v=>v&&v.trim()))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;ps.appendChild(o);});
}

function getFiltered(){
  const a=document.getElementById('sel-asig').value;
  const p=document.getElementById('sel-per').value;

  // Build allowed asignaturas list for coordinador (primary + extras)
  let allowedAsigs=null;
  if(window.SESSION?.user?.rol==='coordinador'){
    const extras=(window.SESSION.user.asignaturas_extra||'').split('|').filter(Boolean);
    allowedAsigs=[window.SESSION.user.asignatura,...extras].filter(Boolean);
  }

  return window.DATA.filter(r=>{
    const ra=(r['Asignatura a evaluar']||'').trim();
    const rp=(r['Periodo en evaluación']||'').trim();
    if(allowedAsigs && !allowedAsigs.includes(ra)) return false;
    if(a && ra!==a) return false;
    if(p && rp!==p) return false;
    return true;
  });
}

/* ── Matrix block (per-question stacked bars, HTML) ── */
function matrixBlock(sec, recs){
  const items=sec.fields.map(f=>{
    const vals=recs.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LK[v]!==undefined);
    if(!vals.length) return {f,pcts:null,av:null};
    const tot=vals.length;
    const pcts={};
    LK_CATS.forEach(c=>{pcts[c]=parseFloat((vals.filter(v=>v===c).length/tot*100).toFixed(1));});
    const av=vals.map(v=>LK[v]).reduce((a,b)=>a+b,0)/tot;
    return {f,pcts,av,tot};
  });
  const valid=items.filter(i=>i.av!==null);
  const sAvg=valid.length?avg(valid.map(i=>i.av)):null;

  const rows=items.map(item=>{
    const lbl=shortQ(item.f);
    if(!item.pcts) return `<div class="mq"><span class="mq-lbl">${lbl}</span><span class="mq-na">No aplica</span></div>`;
    const segs=LK_CATS.map(c=>{
      const p=item.pcts[c];
      if(p<0.5) return '';
      return `<div class="mq-seg" style="width:${p}%;background:${LK_COL[c]}" title="${c}: ${p}%">${p>=14?Math.round(p)+'%':''}</div>`;
    }).join('');
    return `<div class="mq">
      <span class="mq-lbl">${lbl}</span>
      <div class="mq-track">${segs}</div>
      <span class="mq-num" style="color:${semColor(item.av)}">${item.av.toFixed(1)}</span>
    </div>`;
  }).join('');

  return `<div class="mblock">
    <div class="mblock-hdr">
      <span>${sec.title}</span>
      ${sAvg!==null?`<span class="mblock-avg">prom. ${sAvg.toFixed(2)}</span>`:''}
    </div>
    <div class="mblock-body">${rows}</div>
  </div>`;
}

    if(v&&typeof v==='string'&&v.trim().length>8&&!SKIP.some(x=>norm(v.trim())===norm(x))) texts.push(v.trim());
  }));
  return texts;
}

const TOPICS = [
  {label:'Actualización bibliográfica',      keys:['bibliograf','referencia','actualiz','recurso','digital','acceso','fuente','libro']},
  {label:'Estrategias didácticas',           keys:['didactic','metodolog','estrategia','tic','tecnolog','herramienta','clase','dinamica','didáctica']},

// Palabras que sugieren queja/problema
const NEG_KEYS = ['falta','faltan','deficiente','malo','mala','mejorar','mejoraría','debería','necesita',
  'insuficiente','poca','poco','no hay','desactualiz','dificil','difícil','problema','problemas',
  'queja','critica','crítica','inadecuado','incumplimiento','faltó','faltaron','escaso','escasa'];

function clusterTexts(texts) {
  const unique = [...new Set(texts)]; // deduplicate source
  const lowers = unique.map(t => norm(t));
  const usedReps = new Set();
  const results = [];

  for (const tp of TOPICS) {
    if (results.length >= unique.length) break; // can't have more clusters than unique texts
    const nkeys = tp.keys.map(k => norm(k));
    const matching = unique.filter((t,i) => nkeys.some(k => lowers[i].includes(k)));
    if (!matching.length) continue;

    // Pick most specific (most keyword hits) unused representative
    const best = matching
      .map(t => ({ t, score: nkeys.filter(k => norm(t).includes(k)).length }))
      .sort((a,b) => b.score - a.score || b.t.length - a.t.length)
      .find(c => !usedReps.has(c.t));

    if (!best) continue; // no unique rep available for this topic — skip

    usedReps.add(best.t);
    results.push({ label: tp.label, count: matching.length, summary: best.t });
  }

  return results.sort((a,b) => b.count - a.count);
}



function negativeTexts(texts) {
  const lowers = texts.map(t => norm(t));
  const nnegs = NEG_KEYS.map(k => norm(k));
  return texts.filter((t,i) => nnegs.some(k => lowers[i].includes(k)));
}

/* ── CSV loader ── */
function loadCSV(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('CSV vacío o sin datos.');return;}
      const headers=parseCSV(lines[0]);
      const recs=[];
      for(let i=1;i<lines.length;i++){
        const vals=parseCSV(lines[i]);
        if(vals.length<2)continue;
        const obj={};
        headers.forEach((h,idx)=>{obj[h.trim()]=(vals[idx]||'').trim();});
        recs.push(obj);
      }
      if(!recs.length){alert('No se encontraron registros.');return;}
      window.DATA=recs;
      initSelectors();
      renderDashboard();
      e.target.value='';
      alert(`✅ ${recs.length} registros cargados correctamente.`);
    }catch(err){alert('Error leyendo CSV: '+err.message);}
  };
  reader.readAsText(file,'UTF-8');
}

function parseCSV(line){
  const out=[]; let cur=''; let q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===','&&!q){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur);
  return out;
}

// ⚠️  Cambia esta URL por la de tu proxy Vercel después del deploy
const PROXY_URL = 'https://redcap-proxy-med.vercel.app/api/redcap';
const AUTO_REFRESH_MIN = 30; // refresca cada N minutos automáticamente

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-msg');
  dot.className = 'sync-dot ' + (state === 'ok' ? 'ok' : state === 'err' ? 'err' : 'spin');
  txt.textContent = msg;
}

async function syncREDCap() {
  if (!window.SESSION) return; // No renderizar sin sesión activa
  setSyncStatus('spin', 'Descargando datos desde REDCap…');
  try {
    const res = await fetch(PROXY_URL, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!Array.isArray(json) || json.length === 0) throw new Error('Sin registros en la respuesta');

    // REDCap API devuelve claves raw con valores numéricos — mapear siempre a labels
    window.DATA = json.map(r => {
      const clean = {};
      Object.keys(r).forEach(k => {
        const v = r[k];
        clean[k] = (v === null || v === undefined) ? '' : String(v).trim();
      });
      return mapRawToLabels(clean);
    });

    const now = new Date().toLocaleString('es-CO', {dateStyle:'short', timeStyle:'short'});
    setSyncStatus('ok', `${window.DATA.length} registros · última actualización: ${now}`);
    const fts = document.getElementById('footer-ts');
    if (fts) fts.textContent = now;
    initSelectors();
    renderDashboard();
  } catch(e) {
    setSyncStatus('err', `Error REDCap: ${e.message} — usando datos locales`);
    const fsrc = document.getElementById('footer-src');
    if (fsrc) fsrc.textContent = 'Fuente: datos locales (sin conexión REDCap)';
    initSelectors();
    renderDashboard();
  }
}

    if (allA.length === 1) {
      // Single asignatura — lock selector
      selAsig.disabled = true;
      selAsig.title = 'Solo puedes ver tu asignatura';

      selAsig.disabled = false;
      selAsig.value = '';
      selAsig.title = `Puedes ver: ${allA.join(', ')}`;
    }
  } else {
    selAsig.disabled = false;
    selAsig.value = '';
    selAsig.title = '';
  }

  syncREDCap();
}

  const saved = localStorage.getItem('evalmed_session');
  if (saved) {
    try {
      const { token, user } = JSON.parse(saved);
      const r = await authCall({ action:'verify', token });
      if (r.ok) { onLoginSuccess(token, r.user); return; }
    } catch(e) {}
    localStorage.removeItem('evalmed_session');
  }
  // Show login overlay
  document.getElementById('auth-overlay').style.display = 'flex';
}

// Director: load user management panel
async function loadPendingUsers() {
  if (window.SESSION?.user?.rol !== 'director') return;

  const [rPending, rAll] = await Promise.all([
    authCall({ action:'list_pending', token: window.SESSION.token }),
    authCall({ action:'list_all',     token: window.SESSION.token })
  ]);

  const pending = rPending.usuarios || [];
  const all     = rAll.usuarios     || [];

  const pendingHtml = pending.length ? pending.map(u => `
    <div class="pending-row" id="prow-${u.id}">
      <div class="pending-info">
        <div class="pending-name">${u.nombre}</div>
        <div class="pending-sub">${u.correo} · ${u.asignatura||'—'}</div>
      </div>
      <button class="btn-activate" onclick="activateUser('${u.id}',this)">Activar</button>
    </div>`).join('')
  : '<div style="padding:12px 18px;font-size:12px;color:var(--muted)">✅ No hay cuentas pendientes.</div>';

  const allHtml = all.map(u => {
    const extras = (u.asignaturas_extra||'').split('|').filter(Boolean);
    const allA   = [u.asignatura,...extras].filter(Boolean);
    const opts   = ASIG_LIST.filter(a=>!allA.includes(a)).map(a=>`<option value="${a}">${a}</option>`).join('');
    return `
    <div class="pending-row" id="urow-${u.id}">
      <div class="pending-info" style="flex:1">
        <div class="pending-name">${u.nombre} <span style="font-size:10px;color:var(--muted);font-weight:400">${u.correo}</span></div>
        <div class="asig-chips" id="chips-${u.id}">
          ${allA.map(a=>`<span class="asig-chip">${a}</span>`).join('')}
        </div>
        <div class="asig-add-row">
          <select class="asig-add-sel" id="newasig-${u.id}">
            <option value="">+ Agregar asignatura…</option>${opts}
          </select>
          <button class="btn-manage" onclick="addAsignatura('${u.id}')">Agregar</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const panel = document.createElement('div');
  panel.className = 'dir-panel';
  panel.id = 'dir-mgmt-panel';
  panel.innerHTML = `
    <div class="dir-panel-hdr"><h3>⚙️ Gestión de coordinadores</h3></div>
    <div class="dir-tabs">
      <button class="dir-tab active" onclick="showDirTab('pending')">Pendientes (${pending.length})</button>
      <button class="dir-tab" onclick="showDirTab('all')">Todos (${all.length})</button>
    </div>
    <div id="dir-tab-pending">${pendingHtml}</div>
    <div id="dir-tab-all" style="display:none">${allHtml}</div>`;

  const existing = document.getElementById('dir-mgmt-panel');
  if (existing) existing.remove();
  document.getElementById('main').prepend(panel);
}

function showDirTab(tab) {
  document.getElementById('dir-tab-pending').style.display = tab==='pending' ? '' : 'none';
  document.getElementById('dir-tab-all').style.display     = tab==='all'     ? '' : 'none';
  document.querySelectorAll('.dir-tab').forEach((el,i) =>
    el.classList.toggle('active',(i===0&&tab==='pending')||(i===1&&tab==='all')));
}

async function activateUser(id, btn) {
  btn.textContent='…'; btn.disabled=true;
  const r = await authCall({ action:'activate', token:window.SESSION.token, usuario_id:id });
  if(r.ok){ btn.closest('.pending-row').style.background='#e8f6ee'; btn.textContent='✓ Activado'; }
  else { btn.textContent='Error'; btn.disabled=false; }
}

async function addAsignatura(userId) {
  const sel  = document.getElementById('newasig-'+userId);
  const asig = sel.value;
  if(!asig) return;
  sel.disabled=true;
  const r = await authCall({ action:'add_asignatura', token:window.SESSION.token, usuario_id:userId, asignatura:asig });
  if(r.ok){
    const chips = document.getElementById('chips-'+userId);
    const chip  = document.createElement('span');
    chip.className='asig-chip'; chip.textContent=asig;
    chips.appendChild(chip);
    sel.remove(sel.selectedIndex);
    sel.value=''; sel.disabled=false;
  } else { alert('Error: '+(r.error||'desconocido')); sel.disabled=false; }
}


/* ── Boot ── */
initAuth();
setInterval(() => {
  if (window.SESSION) syncREDCap();
}, AUTO_REFRESH_MIN * 60 * 1000);

</script>
