<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Evaluación de Asignaturas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --c1:#1D5FA6;--c2:#2478C5;--c3:#4A9DD4;--c4:#7DBFE8;
    --bg:#F4F7FA;--card:#ffffff;--text:#1a2535;--muted:#5a6e85;--border:#dce6ef;
    --green:#1a7a4a;--green-bg:#e8f6ee;--amber:#8a5e00;--amber-bg:#fef3d6;
    --red:#b02020;--red-bg:#fde8e8;--blue-bg:#e8f1fb;
    --radius:12px;--shadow:0 2px 12px rgba(29,95,166,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:linear-gradient(135deg,#0d3d6e 0%,#1D5FA6 60%,#2478C5 100%);padding:28px 32px 24px;display:flex;align-items:center;gap:20px;}
  .logo-circle{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;flex-shrink:0;border:2px solid rgba(255,255,255,0.25);}
  header h1{color:#fff;font-size:22px;font-weight:600;line-height:1.2;}
  header p{color:rgba(255,255,255,0.75);font-size:13px;margin-top:3px;}
  .filters-bar{background:var(--card);padding:16px 32px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .filter-group{display:flex;flex-direction:column;gap:5px;}
  .filter-group label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;}
  select{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);background:var(--bg);cursor:pointer;min-width:200px;outline:none;transition:border-color 0.2s;}
  select:focus{border-color:var(--c2);}
  .btn-primary{background:var(--c1);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;gap:7px;}
  .btn-primary:hover{background:var(--c2);}
  main{padding:28px 32px;max-width:1400px;margin:0 auto;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
  .kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;}
  .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-weight:600;}
  .kpi-value{font-size:32px;font-weight:700;color:var(--c1);line-height:1.1;margin:6px 0 2px;}
  .kpi-sub{font-size:12px;color:var(--muted);}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-weight:700;margin-bottom:14px;border-left:3px solid var(--c1);padding-left:10px;}
  .charts-top{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .chart-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
  .chart-card h3{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.05em;}
  .chart-wrap{position:relative;width:100%;}
  .stacked-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:28px;}
  .stacked-card h3{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
  .stacked-subtitle{font-size:11px;color:var(--muted);margin-bottom:18px;}
  .stacked-legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:16px;font-size:11px;}
  .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
  .section-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
  .section-header{background:linear-gradient(90deg,var(--c1) 0%,var(--c3) 100%);padding:12px 20px;display:flex;align-items:center;gap:10px;}
  .section-header h2{color:#fff;font-size:14px;font-weight:600;}
  .section-badge{background:rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;}
  .items-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .item-row{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .item-row:nth-child(odd){background:#f8fafc;}
  .item-question{font-size:12.5px;color:var(--text);flex:1;line-height:1.4;}
  .badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
  .badge-excelente{background:#d1fae5;color:#065f46;}
  .badge-bueno{background:var(--green-bg);color:var(--green);}
  .badge-aceptable{background:var(--amber-bg);color:var(--amber);}
  .badge-deficiente{background:var(--red-bg);color:var(--red);}
  .badge-noapl{background:#f1f5f9;color:#64748b;}
  .text-analysis{margin-bottom:28px;}
  .comments-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
  .comments-header{background:linear-gradient(90deg,#0d3d6e 0%,#1D5FA6 100%);padding:14px 20px;}
  .comments-header h2{color:#fff;font-size:14px;font-weight:600;}
  .comments-body{padding:20px;}
  .top5-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .top5-item{border:1px solid var(--border);border-radius:10px;padding:14px 14px 11px;background:var(--bg);position:relative;}
  .top5-num{position:absolute;top:-10px;left:14px;background:var(--c1);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
  .top5-text{font-size:13px;color:var(--text);line-height:1.55;margin-top:6px;}
  .top5-freq{font-size:11px;color:var(--muted);margin-top:7px;display:flex;align-items:center;gap:4px;}
  .freq-bar{display:inline-block;height:5px;border-radius:3px;background:var(--c3);vertical-align:middle;margin-right:4px;}
  .texts-raw{margin-top:4px;border-top:1px solid var(--border);padding-top:16px;}
  .texts-raw-title{font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-weight:700;margin-bottom:10px;}
  .text-item{padding:10px 14px;border-left:3px solid var(--c4);background:var(--bg);border-radius:0 8px 8px 0;margin-bottom:8px;font-size:12.5px;color:var(--muted);line-height:1.5;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .sat-dist{display:flex;flex-direction:column;gap:8px;padding:4px 0;}
  .sat-bar{display:flex;align-items:center;gap:10px;font-size:12.5px;}
  .sat-label{width:70px;color:var(--muted);flex-shrink:0;}
  .sat-track{flex:1;background:#eef2f7;border-radius:6px;height:14px;overflow:hidden;}
  .sat-fill{height:100%;border-radius:6px;transition:width 0.6s ease;}
  .sat-count{width:24px;text-align:right;font-weight:600;color:var(--text);flex-shrink:0;}
  .nota-info{background:var(--blue-bg);border:1px solid #bcd6f0;border-radius:8px;padding:10px 14px;font-size:12px;color:#1a4f80;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
  footer{border-top:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:10px;}
  .csv-zone{display:flex;align-items:center;gap:8px;opacity:0.4;transition:opacity 0.2s;}
  .csv-zone:hover{opacity:1;}
  .csv-zone label{cursor:pointer;font-size:10px;color:var(--muted);text-decoration:underline;text-underline-offset:2px;}
  #csv-file-input{display:none;}
  @media(max-width:768px){main,.filters-bar,header,footer{padding-left:16px;padding-right:16px;}.charts-top{grid-template-columns:1fr;}.items-grid{grid-template-columns:1fr;}.ideas-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

let chartInstances = {};

function destroyCharts() { Object.values(chartInstances).forEach(c=>c.destroy()); chartInstances={}; }

function badgeClass(v) {
  if(!v||v==='No aplica') return 'badge-noapl';
  if(v==='Excelente') return 'badge-excelente';
  if(v==='Bueno') return 'badge-bueno';
  if(v==='Aceptable') return 'badge-aceptable';
  if(v==='Deficiente') return 'badge-deficiente';
  return 'badge-noapl';
}

function shortLabel(q) {
  return q.replace(/^La |^El |^Si aplica, /,'').replace(/ fue:$/,'').replace(/ fueron:$/,'').trim().split(' ').slice(0,9).join(' ')+'…';
}

function avgScore(records, field) {
  const vals = records.map(r=>LIKERT[r[field]]).filter(v=>v>0);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function scoreLabel(s) {
  if(s===null) return 'N/A';
  if(s>=3.5) return 'Excelente'; if(s>=2.5) return 'Bueno'; if(s>=1.5) return 'Aceptable'; return 'Deficiente';
}

function initSelectors() {
  const asigSel = document.getElementById('sel-asignatura');
  asigSel.innerHTML = '<option value="">— Todas las asignaturas —</option>';
  const present = [...new Set(ALL_RECORDS.map(r=>r['Asignatura a evaluar']).filter(Boolean))];
  const ordered = ALL_ASIGNATURAS.filter(a=>present.includes(a));
  const rest = present.filter(a=>!ALL_ASIGNATURAS.includes(a));
  [...ordered,...rest].forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;asigSel.appendChild(o);});
  const perSel = document.getElementById('sel-periodo');
  perSel.innerHTML = '<option value="">— Todos los periodos —</option>';
  [...new Set(ALL_RECORDS.map(r=>r['Periodo en evaluación']).filter(Boolean))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;perSel.appendChild(o);});
}

function getFiltered() {
  const asig = document.getElementById('sel-asignatura').value;
  const per = document.getElementById('sel-periodo').value;
  return ALL_RECORDS.filter(r=>(!asig||r['Asignatura a evaluar']===asig)&&(!per||r['Periodo en evaluación']===per));
}

function renderDashboard() {
  const records = getFiltered();
  destroyCharts();
  if(!records.length) { document.getElementById('main-content').innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>No hay datos para la selección actual.</p></div>`; return; }
  const asig = document.getElementById('sel-asignatura').value||'Todas las asignaturas';
  const per = document.getElementById('sel-periodo').value||'Todos los periodos';
  const allFields = SECTIONS.flatMap(s=>s.fields);
  const allScores = allFields.map(f=>avgScore(records,f)).filter(v=>v!==null);
  const globalAvg = allScores.length ? allScores.reduce((a,b)=>a+b,0)/allScores.length : 0;
  const satCounts = Object.fromEntries(SAT_ORDER.map(k=>[k,0]));
  records.forEach(r=>{const s=r['¿Cuál es su nivel de satisfacción general con esta asignatura?'];if(s&&satCounts[s]!==undefined)satCounts[s]++;});
  const totalSat = Object.values(satCounts).reduce((a,b)=>a+b,0);
  const satAvg = totalSat ? Object.entries(satCounts).map(([k,v])=>(SAT_ORDER.indexOf(k)+1)*v).reduce((a,b)=>a+b,0)/totalSat : 0;
  const satPct = Math.round((satAvg/5)*100);
  const gColor = globalAvg>=3?'var(--green)':globalAvg>=2?'var(--amber)':'var(--red)';
  const sColor = satAvg>=4?'var(--green)':satAvg>=3?'var(--amber)':'var(--red)';

  document.getElementById('main-content').innerHTML = `
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Respuestas</div><div class="kpi-value">${records.length}</div><div class="kpi-sub">${asig.length>30?asig.substring(0,30)+'…':asig}</div></div>
    <div class="kpi-card"><div class="kpi-label">Puntaje global</div><div class="kpi-value" style="color:${gColor}">${globalAvg.toFixed(2)}</div><div class="kpi-sub">${scoreLabel(globalAvg)} / 4.0</div></div>
    <div class="kpi-card"><div class="kpi-label">Satisfacción</div><div class="kpi-value" style="color:${sColor}">${satPct}%</div><div class="kpi-sub">${satAvg.toFixed(1)} / 5.0</div></div>
    <div class="kpi-card"><div class="kpi-label">Periodo</div><div class="kpi-value" style="font-size:22px">${per}</div><div class="kpi-sub">Evaluado</div></div>
  </div>

  <div class="charts-top">
    <div class="chart-card">
      <h3>Puntaje promedio por sección</h3>
      <div class="chart-wrap" style="height:260px"><canvas id="chart-sections" role="img" aria-label="Puntaje promedio por sección"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Satisfacción general</h3>
      <div class="sat-dist">${SAT_ORDER.map(k=>`<div class="sat-bar"><span class="sat-label">${k}</span><div class="sat-track"><div class="sat-fill" style="width:${totalSat?Math.round(satCounts[k]/totalSat*100):0}%;background:${SAT_COLORS[k]}"></div></div><span class="sat-count">${satCounts[k]}</span></div>`).join('')}</div>
    </div>
  </div>

  <div class="stacked-card">
    <h3>Distribución de respuestas por sección (escala Likert)</h3>
    <p class="stacked-subtitle">Porcentaje de respuestas en cada categoría, excluyendo "No aplica". Un grupo de barras por sección.</p>
    <div class="stacked-legend">${LIKERT_CATS.map(c=>`<span><span class="legend-dot" style="background:${LIKERT_COLORS[c]}"></span>${c}</span>`).join('')}</div>
    <div class="chart-wrap" style="height:${SECTIONS.length*60+60}px"><canvas id="chart-stacked" role="img" aria-label="Distribución Likert por sección"></canvas></div>
  </div>

  ${SECTIONS.map(s=>renderSection(s,records)).join('')}

  <div class="text-analysis">
    <p class="section-title">Comentarios y sugerencias</p>
    ${renderComments(records)}
  </div>`;

  setTimeout(()=>{ renderSectionsChart(records); renderStackedChart(records); }, 80);
}

function renderSection(section, records) {
  const applicable = records.filter(r=>section.fields.some(f=>{const v=r[f];return v&&v!=='No aplica'&&LIKERT[v]!==undefined;}));
  const items = section.fields.map(f=>{
    const vals = records.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LIKERT[v]!==undefined);
    const modal = vals.reduce((acc,v)=>{acc[v]=(acc[v]||0)+1;return acc;},{});
    const modeVal = Object.keys(modal).sort((a,b)=>modal[b]-modal[a])[0]||null;
    return {field:f,modeVal,n:vals.length};
  });
  const secScores = section.fields.map(f=>avgScore(records,f)).filter(v=>v!==null);
  const secAvgVal = secScores.length ? secScores.reduce((a,b)=>a+b,0)/secScores.length : null;
  return `<div class="section-card">
    <div class="section-header">
      <h2>${section.title}</h2>
      <span class="section-badge">${applicable.length} resp. aplicables</span>
      ${secAvgVal!==null?`<span class="section-badge" style="margin-left:auto">${secAvgVal.toFixed(2)} / 4.0</span>`:''}
    </div>
    <div class="items-grid">${items.map(item=>`
      <div class="item-row">
        <span class="item-question">${shortLabel(item.field)}</span>
        ${item.modeVal?`<span class="badge ${badgeClass(item.modeVal)}">${item.modeVal}</span>`:'<span class="badge badge-noapl">N/A</span>'}
      </div>`).join('')}
    </div>
  </div>`;
}

function renderComments(records) {
  const allTexts = [];
  SECTIONS.forEach(s=>{
    records.forEach(r=>{
      const v=r[s.textField];
      if(v&&typeof v==='string'&&v.trim()&&!['No aplica.','No aplica','Ninguno','ninguno','N/A','ninguna'].some(x=>v.trim().toLowerCase()===x.toLowerCase())) allTexts.push(v.trim());
    });
  });
  if(!allTexts.length) return `<div class="comments-card"><div class="comments-header"><h2>Comentarios y sugerencias</h2></div><div class="comments-body"><p style="color:var(--muted);font-size:13px">No hay comentarios disponibles para esta selección.</p></div></div>`;

  const top5 = getTop5(allTexts);
  const maxFreq = top5[0]?.score||1;

  return `<div class="comments-card">
    <div class="comments-header"><h2>Top 5 temas más frecuentes en comentarios (${allTexts.length} respuestas)</h2></div>
    <div class="comments-body">
      <div class="top5-grid">
        ${top5.map((item,i)=>`
          <div class="top5-item">
            <div class="top5-num">#${i+1}</div>
            <div class="top5-text">${item.summary}</div>
            <div class="top5-freq">
              <span class="freq-bar" style="width:${Math.round(item.score/maxFreq*60)+10}px"></span>
              Mencionado en ${item.count} de ${allTexts.length} comentarios
            </div>
          </div>`).join('')}
      </div>
      <div class="texts-raw">
        <p class="texts-raw-title">Todos los comentarios (${allTexts.length})</p>
        ${allTexts.map(t=>`<div class="text-item">${t}</div>`).join('')}
      </div>
    </div>
  </div>`;
}

function getTop5(texts) {
  // Keyword clusters: each topic has seed keywords; count how many texts mention at least one
  const TOPICS = [
    {label:'Actualización bibliográfica y recursos',  keys:['bibliograf','referencia','actualiz','recurso','document','libro','fuente','digital','acceso']},
    {label:'Estrategias didácticas y metodología',    keys:['didáctic','metodolog','estrategia','tic','tecnolog','herramienta','clase','enseñanza','dinámic']},
    {label:'Retroalimentación y evaluación',          keys:['retroaliment','evaluacion','evaluación','examen','calificac','nota','coherencia','criterio','parcial']},
    {label:'Práctica clínica y escenarios',           keys:['clínic','clínico','práctic','hospital','escenario','rotación','paciente','infraestructura','equipo']},
    {label:'Investigación y pensamiento crítico',     keys:['investigac','científic','artículo','caso','crítico','análisis','formativ','investigat']},
    {label:'Atención y disponibilidad del docente',   keys:['docente','profesor','disponib','atención','horario','acompañ','seguimiento','trato','diálogo']},
    {label:'Contenidos teóricos y programación',      keys:['contenido','programa','cronograma','tema','teóric','temátic','planificac','plan']},
    {label:'Laboratorio e infraestructura',           keys:['laboratori','infraestructura','insumo','equipo','mater','instalac','guía']},
    {label:'Trabajo independiente y tiempo',          keys:['independiente','tiempo','carga','trabajo','autónomo','autoestudio','intensidad']},
    {label:'Proyección e integración profesional',    keys:['profesional','perfil','proyección','integrac','social','aplicabilidad','proyect']},
  ];

  const lowers = texts.map(t=>t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));

  const scored = TOPICS.map(topic=>{
    const matchingTexts = lowers.filter(t=>topic.keys.some(k=>t.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,''))));
    // pick the most representative actual comment for this topic
    let bestText = '';
    let bestLen = 0;
    texts.forEach((t,i)=>{
      if(topic.keys.some(k=>lowers[i].includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,'')))&&t.length>bestLen){bestText=t;bestLen=t.length;}
    });
    // Summarize: trim to ~120 chars
    const summary = bestText.length>130 ? bestText.substring(0,127).replace(/\s\S*$/,'')+'…' : (bestText||topic.label);
    return {label:topic.label, count:matchingTexts.length, score:matchingTexts.length, summary};
  });

  return scored.filter(t=>t.count>0).sort((a,b)=>b.score-a.score).slice(0,5);
}

function renderSectionsChart(records) {
  const ctx = document.getElementById('chart-sections'); if(!ctx) return;
  const labels = SECTIONS.map(s=>s.title);
  const data = SECTIONS.map(s=>{
    const vals = s.fields.flatMap(f=>records.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LIKERT[v]!==undefined).map(v=>LIKERT[v]));
    return vals.length ? parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)) : 0;
  });
  const colors = data.map(v=>v>=3?'#1a7a4a':v>=2?'#e8a020':'#b02020');
  chartInstances['sections'] = new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors.map(c=>c+'33'),borderColor:colors,borderWidth:2,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`Promedio: ${ctx.parsed.y.toFixed(2)}`}}},scales:{y:{min:0,max:4,ticks:{stepSize:1,callback:v=>['','Deficiente','Aceptable','Bueno','Excelente'][v]||v,font:{size:10}},grid:{color:'#eef2f7'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
}

function renderStackedChart(records) {
  const ctx = document.getElementById('chart-stacked'); if(!ctx) return;
  const labels = SECTIONS.map(s=>s.title);

  const datasets = LIKERT_CATS.map(cat=>({
    label: cat,
    backgroundColor: LIKERT_COLORS[cat]+'cc',
    borderColor: LIKERT_COLORS[cat],
    borderWidth: 1,
    data: SECTIONS.map(s=>{
      const vals = s.fields.flatMap(f=>records.map(r=>r[f]).filter(v=>v&&v!=='No aplica'&&LIKERT[v]!==undefined));
      if(!vals.length) return 0;
      const count = vals.filter(v=>v===cat).length;
      return parseFloat((count/vals.length*100).toFixed(1));
    })
  }));

  chartInstances['stacked'] = new Chart(ctx,{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      indexAxis:'y',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toFixed(1)}%`}}
      },
      scales:{
        x:{stacked:true,min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'#eef2f7'}},
        y:{stacked:true,ticks:{font:{size:11}}}
      }
    }
  });
}


function handleCSVUpload(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('El archivo CSV está vacío o no tiene datos.');return;}
      const headers = parseCSVLine(lines[0]);
      const records = [];
      for(let i=1;i<lines.length;i++){
        const vals = parseCSVLine(lines[i]);
        if(vals.length<2) continue;
        const obj={};
        headers.forEach((h,idx)=>{obj[h.trim()]=(vals[idx]||'').trim();});
        records.push(obj);
      }
      if(!records.length){alert('No se encontraron registros en el CSV.');return;}
      ALL_RECORDS = records;
      initSelectors();
      renderDashboard();
      event.target.value='';
      const zone = document.querySelector('.csv-zone');
      if(zone){zone.style.opacity='1';setTimeout(()=>zone.style.opacity='',3000);}
      alert(`✅ ${records.length} registros cargados correctamente.`);
    } catch(err){alert('Error al leer el CSV: '+err.message);}
  };
  reader.readAsText(file,'UTF-8');
}

function parseCSVLine(line) {
  const result=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

window.setRecords = function(r){ALL_RECORDS=r;initSelectors();renderDashboard();};
initSelectors();
if(ALL_RECORDS.length) renderDashboard();
</script>
