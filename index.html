<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinación Programa de Medicina | Universidad del Cauca</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --azul:#001B6D;
    --rojo:#B5121B;
    --gris:#f4f6f9;
    --texto:#2c2c2c;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--gris);
    color:var(--texto);
}

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:
    linear-gradient(rgba(0,27,109,.92), rgba(0,27,109,.92)),
    url('https://images.unsplash.com/photo-1516549655169-df83a0774514');
    background-size:cover;
    background-position:center;
    color:white;
    padding:40px;
}

.container{
    max-width:900px;
}

.logo{
    width:110px;
    margin-bottom:30px;
}

h1{
    font-size:3.5rem;
    font-weight:700;
    margin-bottom:20px;
}

h2{
    font-size:1.5rem;
    font-weight:300;
    margin-bottom:30px;
}

p{
    font-size:1.1rem;
    max-width:700px;
    margin:auto;
    line-height:1.8;
}

.line{
    width:90px;
    height:4px;
    background:var(--rojo);
    margin:35px auto;
    border-radius:10px;
}

footer{
    position:absolute;
    bottom:25px;
    left:0;
    width:100%;
    text-align:center;
    font-size:.9rem;
    opacity:.85;
}

@media(max-width:768px){

    h1{
        font-size:2.3rem;
    }

    h2{
        font-size:1.2rem;
    }

    p{
        font-size:1rem;
    }
}

</style>

</head>

<body>

<section class="hero">

```
<div class="container">

    <img class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Escudo_Universidad_del_Cauca.svg"
    alt="Universidad del Cauca">

    <h1>Coordinación Programa de Medicina</h1>

    <h2>Universidad del Cauca</h2>

    <div class="line"></div>

    <p>
        Sitio web oficial de la Coordinación del Programa de Medicina
        de la Universidad del Cauca.
    </p>

</div>

<footer>
    © 2026 · Universidad del Cauca · Popayán, Colombia
</footer>
```

</section>

</body>
</html>
